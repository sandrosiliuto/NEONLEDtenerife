<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon LED Tenerife | Rótulos Personalizados</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px #ec4899, 0 0 15px #ec4899; }
            50% { box-shadow: 0 0 25px #ec4899, 0 0 35px #ec4899; }
        }
        
        .neon-text-pink { text-shadow: 0 0 15px #ec4899; color: #ec4899; }
        .neon-text-cyan { text-shadow: 0 0 15px #22d3ee; color: #22d3ee; }
        .neon-btn { animation: glow 2.5s infinite; }
        
        html { scroll-behavior: smooth; }

        /* Estilos personalizados para el scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #ec4899; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Iconos de Lucide (usamos componentes SVG para asegurar compatibilidad)
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                // Inicializar iconos de Lucide
                if (window.lucide) window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isMenuOpen]);

            const navLinks = [
                { name: 'Inicio', href: '#inicio' },
                { name: 'Servicios', href: '#servicios' },
                { name: 'Galería', href: '#galeria' },
                { name: 'Nosotros', href: '#nosotros' },
                { name: 'Contacto', href: '#contacto' },
            ];

            const services = [
                {
                    title: 'Neón LED Personalizado',
                    desc: 'Diseños exclusivos fabricados a medida en Tenerife.',
                    icon: 'lightbulb',
                    color: 'text-pink-500',
                    img: 'https://images.unsplash.com/photo-1563245372-f21724e3856d?auto=format&fit=crop&q=80&w=800'
                },
                {
                    title: 'Rótulos Corpóreos',
                    desc: 'Letras con relieve e iluminación de alto impacto.',
                    icon: 'layout',
                    color: 'text-cyan-400',
                    img: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=800'
                },
                {
                    title: 'Eventos y Photocalls',
                    desc: 'Alquiler y venta para bodas y celebraciones.',
                    icon: 'star',
                    color: 'text-purple-500',
                    img: 'https://images.unsplash.com/photo-1522673607200-164883eecd18?auto=format&fit=crop&q=80&w=800'
                }
            ];

            const projects = [
                { id: 1, title: 'Barbería Estilo Retro', category: 'Comercial', img: 'https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80&w=600', color: 'border-pink-500' },
                { id: 2, title: 'Gimnasio High Voltage', category: 'Fitness', img: 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=600', color: 'border-cyan-500' },
                { id: 3, title: 'Boda Neón "Better Together"', category: 'Eventos', img: 'https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&q=80&w=600', color: 'border-purple-500' },
                { id: 4, title: 'Setup Gaming Personalizado', category: 'Decoración', img: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=600', color: 'border-green-500' },
                { id: 5, title: 'Logo Restaurante Gourmet', category: 'Hostelería', img: 'https://images.unsplash.com/photo-1554469384-e58fac16e23a?auto=format&fit=crop&q=80&w=600', color: 'border-blue-500' },
                { id: 6, title: 'Cocktail Bar Lounge', category: 'Ocio', img: 'https://images.unsplash.com/photo-1567449300518-034888b8a9a2?auto=format&fit=crop&q=80&w=600', color: 'border-red-500' },
            ];

            return (
                <div className="min-h-screen">
                    {/* Navegación */}
                    <nav className={`fixed w-full z-[100] transition-all duration-500 ${scrolled ? 'bg-black/95 backdrop-blur-md py-3 border-b border-pink-500/30 shadow-lg' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <a href="#inicio" className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-pink-500 rounded-lg flex items-center justify-center shadow-lg">
                                    <span className="font-black text-xl">N</span>
                                </div>
                                <div className="flex flex-col">
                                    <span className="font-black text-lg tracking-tighter leading-none">NEON LED</span>
                                    <span className="text-pink-500 font-bold text-[10px] tracking-widest">TENERIFE</span>
                                </div>
                            </a>

                            <div className="hidden md:flex items-center gap-8">
                                {navLinks.map((link) => (
                                    <a key={link.name} href={link.href} className="text-[10px] font-black uppercase tracking-widest hover:text-pink-500 transition-colors">
                                        {link.name}
                                    </a>
                                ))}
                                <a href="https://wa.me/34654828074" className="neon-btn bg-pink-600 px-6 py-2 rounded-full text-[10px] font-black tracking-widest flex items-center gap-2">
                                    <Icon name="message-circle" size={14} /> PRESUPUESTO
                                </a>
                            </div>

                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "x" : "menu"} size={28} />
                            </button>
                        </div>

                        {isMenuOpen && (
                            <div className="md:hidden fixed inset-0 bg-black flex flex-col items-center justify-center gap-8 z-[90]">
                                {navLinks.map((link) => (
                                    <a key={link.name} href={link.href} className="text-3xl font-black" onClick={() => setIsMenuOpen(false)}>{link.name}</a>
                                ))}
                                <a href="https://wa.me/34654828074" className="bg-pink-600 px-8 py-4 rounded-xl font-black flex items-center gap-2">
                                    <Icon name="message-circle" /> WHATSAPP
                                </a>
                            </div>
                        )}
                    </nav>

                    {/* Hero */}
                    <section id="inicio" className="relative h-screen flex items-center justify-center px-6 overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1563245372-f21724e3856d?auto=format&fit=crop&q=80&w=1920" className="w-full h-full object-cover opacity-20 filter blur-sm" />
                            <div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#050505]"></div>
                        </div>
                        <div className="relative z-10 text-center max-w-4xl">
                            <span className="inline-block px-4 py-1 rounded-full bg-white/5 border border-white/10 text-pink-500 text-[10px] font-black uppercase tracking-widest mb-6">Fabricado en Tenerife</span>
                            <h1 className="text-5xl md:text-8xl font-black mb-6 leading-none">EXPRESA TU <br/><span className="neon-text-pink italic font-serif uppercase">Esencia</span> EN <br/><span className="neon-text-cyan">NEÓN</span></h1>
                            <p className="text-lg md:text-xl text-slate-400 mb-10 max-w-2xl mx-auto">Transformamos espacios con luz artesanal. Diseño, fabricación e instalación en todas las Islas Canarias.</p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <a href="#contacto" className="bg-pink-600 px-10 py-4 rounded-2xl font-black text-lg hover:scale-105 transition-transform">EMPEZAR PROYECTO</a>
                                <a href="#galeria" className="bg-white/5 border border-white/10 px-10 py-4 rounded-2xl font-black text-lg hover:bg-white/10 transition-colors">VER TRABAJOS</a>
                            </div>
                        </div>
                    </section>

                    {/* Servicios */}
                    <section id="servicios" className="py-24 bg-[#080808]">
                        <div className="max-w-7xl mx-auto px-6">
                            <h2 className="text-4xl md:text-6xl font-black text-center mb-20 uppercase italic tracking-tighter">Nuestros <span className="text-pink-500">Servicios</span></h2>
                            <div className="grid md:grid-cols-3 gap-8">
                                {services.map((s, i) => (
                                    <div key={i} className="bg-white/[0.02] border border-white/5 p-8 rounded-[2.5rem] hover:border-pink-500/50 transition-all">
                                        <div className={`mb-6 ${s.color}`}><Icon name={s.icon} size={40} /></div>
                                        <h3 className="text-2xl font-black mb-4">{s.title}</h3>
                                        <p className="text-slate-400 mb-6">{s.desc}</p>
                                        <img src={s.img} className="w-full h-48 object-cover rounded-2xl grayscale hover:grayscale-0 transition-all duration-500" />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Galeria */}
                    <section id="galeria" className="py-24">
                        <div className="max-w-7xl mx-auto px-6 mb-16 flex flex-col md:flex-row justify-between items-end gap-6">
                            <div>
                                <h2 className="text-5xl md:text-7xl font-black leading-none uppercase tracking-tighter">PROYECTOS <br/><span className="neon-text-cyan">REALES</span></h2>
                            </div>
                            <a href="https://instagram.com/neonledtenerife" className="flex items-center gap-2 bg-pink-600/10 text-pink-500 px-6 py-3 rounded-full font-black text-xs hover:bg-pink-600 hover:text-white transition-all">
                                <Icon name="instagram" size={16} /> @neonledtenerife
                            </a>
                        </div>
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                            {projects.map(p => (
                                <div key={p.id} className="group relative aspect-square rounded-[2rem] overflow-hidden border border-white/10">
                                    <img src={p.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent flex flex-col justify-end p-8">
                                        <span className={`w-fit px-3 py-1 rounded-full text-[8px] font-black border ${p.color} bg-black mb-3`}>{p.category}</span>
                                        <h4 className="text-xl font-black">{p.title}</h4>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Contacto */}
                    <section id="contacto" className="py-24 bg-[#080808]">
                        <div className="max-w-5xl mx-auto px-6 text-center">
                            <h2 className="text-5xl md:text-7xl font-black mb-8 uppercase italic">¿Listo para <span className="text-pink-500">brillar?</span></h2>
                            <p className="text-xl text-slate-400 mb-12">Cuéntanos tu idea y te daremos un presupuesto sin compromiso en menos de 24 horas.</p>
                            <div className="grid md:grid-cols-2 gap-6 text-left">
                                <a href="https://wa.me/34654828074" className="bg-white/[0.03] border border-white/5 p-8 rounded-[2rem] flex items-center gap-6 hover:border-green-500 transition-colors group">
                                    <div className="bg-green-500/20 p-4 rounded-2xl text-green-500 group-hover:bg-green-500 group-hover:text-white transition-all"><Icon name="message-circle" size={32} /></div>
                                    <div>
                                        <span className="block text-[10px] font-black uppercase text-slate-500 tracking-widest">WhatsApp</span>
                                        <span className="text-xl font-black">+34 654 82 80 74</span>
                                    </div>
                                </a>
                                <div className="bg-white/[0.03] border border-white/5 p-8 rounded-[2rem] flex items-center gap-6">
                                    <div className="bg-pink-500/20 p-4 rounded-2xl text-pink-500"><Icon name="map-pin" size={32} /></div>
                                    <div>
                                        <span className="block text-[10px] font-black uppercase text-slate-500 tracking-widest">Ubicación</span>
                                        <span className="text-xl font-black">Santa Cruz de Tenerife</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-12 border-t border-white/5 text-center">
                        <div className="flex items-center justify-center gap-3 mb-6">
                            <div className="w-8 h-8 bg-pink-500 rounded flex items-center justify-center font-black">N</div>
                            <span className="font-black tracking-tighter">NEON LED TENERIFE</span>
                        </div>
                        <p className="text-[10px] font-bold text-slate-600 tracking-[0.3em] uppercase">© 2026 Crafted in Canary Islands</p>
                    </footer>

                    {/* Boton Flotante */}
                    <a href="https://wa.me/34654828074" className="fixed bottom-6 right-6 bg-green-500 p-4 rounded-2xl shadow-2xl z-[200] hover:scale-110 transition-transform">
                        <Icon name="message-circle" className="text-white" />
                    </a>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
